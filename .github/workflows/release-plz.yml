# Release PR の作成と、マージ時のリリース（タグ + GitHub Release）を自動化
# private運用前提: registry 非依存（release-plz.toml の git_only = true）
# バージョンは Conventional Commits に基づいて自動で bump される
name: Release-plz

on:
  push:
    branches:
      - master

jobs:
  release-plz-release:
    name: Release
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@6255b92812bf51d292e488b61469267a391267f6
        with:
          toolchain: stable
      - name: Run release-plz release
        uses: release-plz/action@63ab0c2746bedc448370bad4b0b3d536458398b0
        with:
          command: release
          version: release-plz-v0.3.156
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release PR
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@6255b92812bf51d292e488b61469267a391267f6
        with:
          toolchain: stable
      - name: Run release-plz release-pr
        uses: release-plz/action@63ab0c2746bedc448370bad4b0b3d536458398b0
        with:
          command: release-pr
          version: release-plz-v0.3.156
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
